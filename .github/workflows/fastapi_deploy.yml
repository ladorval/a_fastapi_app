name: Deploy FastApi App

on: 
  push: 
    branches:
      - master

env: 
  HEALTHCHECK_URL: http://127.0.0.1:5000

jobs:
  Deploying-FastAPI:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout the code base from github
        uses: actions/checkout@v5

      - name: Setup the runner
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Build a dedicate conda env.
        run: |
          wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
          bash Miniconda3-latest-Linux-x86_64.sh -b
          /home/runner/minconda3/bin/conda env create -f env.yml
          /home/runner/minconda3/bin/conda activate fastapi
